<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <title>Habar ugradyldy</title>
    <style>
        body {
            background-color: #e0f2f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .alert {
            background-color: #ffffff;
            color: #004d40;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .alert:hover {
            transform: translateY(-3px);
        }
        .alert h4 {
            margin-bottom: 10px;
            color: #2e7d32;
        }
        .alert p {
            margin: 0;
            font-size: 1rem;
            color: #555;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #2e7d32;
            background: transparent;
            color: #2e7d32;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #2e7d32;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="alert">
            <h4>Üstünlikli ugratdyňyz!</h4>
            <p>Siziň habaryňyz üstünlikli ugradyldy. Tiz wagtda habarlaşarys.</p>
        </div>
        <a href="/" class="btn">Baş sahypa dolan</a>
    </div>
</body>
</html>
